<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Product Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">MyStore</div>
        <input type="checkbox" id="menu-toggle">
        <label for="menu-toggle" class="hamburger">&#9776;</label>
        <nav>
            <a href="#">Trang chủ</a>
            <a href="#">Sản phẩm</a>
            <a href="#">Giới thiệu</a>
            <a href="#">Liên hệ</a>
        </nav>
    </header>

    <div class="layout-container">
        <aside class="sidebar">
            <h3>Bộ lọc</h3>
            <select>
                <option>Danh mục 1</option>
                <option>Danh mục 2</option>
            </select>
            <select>
                <option>Giá: Thấp đến cao</option>
                <option>Giá: Cao đến thấp</option>
            </select>
        </aside>

        <main class="product-grid">
            <div class="card">
                <img src="https://placehold.co/300x200" alt="Product 1">
                <h3>Sản phẩm 1</h3>
                <p>100.000đ</p>
                <button>Thêm vào giỏ</button>
            </div>
            <div class="card">
                <img src="https://placehold.co/300x200" alt="Product 2">
                <h3>Sản phẩm 2</h3>
                <p>200.000đ</p>
                <button>Thêm vào giỏ</button>
            </div>
            <div class="card">
                <img src="https://placehold.co/300x200" alt="Product 3">
                <h3>Sản phẩm 3</h3>
                <p>300.000đ</p>
                <button>Thêm vào giỏ</button>
            </div>
            <div class="card">
                <img src="https://placehold.co/300x200" alt="Product 4">
                <h3>Sản phẩm 4</h3>
                <p>400.000đ</p>
                <button>Thêm vào giỏ</button>
            </div>
            <div class="card">
                <img src="https://placehold.co/300x200" alt="Product 5">
                <h3>Sản phẩm 5</h3>
                <p>500.000đ</p>
                <button>Thêm vào giỏ</button>
            </div>
            <div class="card">
                <img src="https://placehold.co/300x200" alt="Product 6">
                <h3>Sản phẩm 6</h3>
                <p>600.000đ</p>
                <button>Thêm vào giỏ</button>
            </div>
            <div class="card">
                <img src="https://placehold.co/300x200" alt="Product 7">
                <h3>Sản phẩm 7</h3>
                <p>700.000đ</p>
                <button>Thêm vào giỏ</button>
            </div>
            <div class="card">
                <img src="https://placehold.co/300x200" alt="Product 8">
                <h3>Sản phẩm 8</h3>
                <p>800.000đ</p>
                <button>Thêm vào giỏ</button>
            </div>
        </main>

        <aside class="ads-bar">
            <h3>Quảng cáo</h3>
            <div class="ad-banner">Banner 1</div>
            <div class="ad-banner">Banner 2</div>
        </aside>
    </div>

    <footer>
        <p>&copy; 2026 MyStore. All rights reserved.</p>
    </footer>
</body>
</html>
