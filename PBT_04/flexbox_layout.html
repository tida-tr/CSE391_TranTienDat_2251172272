<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Navigation & Cards</title>
    <link rel="stylesheet" href="flexbox.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <a href="#">LOGO</a>
        </div>

        <ul class="nav-menu">
            <li><a href="#">Home</a></li>
            <li><a href="#">Products</a></li>
            <li><a href="#">About</a></li>
        </ul>

        <div class="auth-buttons">
            <a href="#">Login</a>
            <a href="#">Register</a>
        </div>
    </nav>

    <main class="container">
        <h2>Sản phẩm nổi bật</h2>
        
        <div class="product-grid">
            <div class="card">
                <img src="https://placehold.co/200x150" alt="Ảnh 1" class="card-img">
                <div class="card-info">
                    <h3>Bàn phím cơ F75</h3>
                    <p class="price">1.250.000đ</p>
                </div>
                <button class="btn-buy">Mua ngay</button>
            </div>
            <div class="card">
                <img src="https://placehold.co/200x150" alt="Ảnh 2" class="card-img">
                <div class="card-info">
                    <h3>Tai nghe IEM</h3>
                    <p class="price">450.000đ</p>
                </div>
                <button class="btn-buy">Mua ngay</button>
            </div>
            <div class="card">
                <img src="https://placehold.co/200x150" alt="Ảnh 3" class="card-img">
                <div class="card-info">
                    <h3>Chuột Gaming</h3>
                    <p class="price">890.000đ</p>
                </div>
                <button class="btn-buy">Mua ngay</button>
            </div>
            <div class="card">
                <img src="https://placehold.co/200x150" alt="Ảnh 4" class="card-img">
                <div class="card-info">
                    <h3>Lót chuột cỡ lớn</h3>
                    <p class="price">150.000đ</p>
                </div>
                <button class="btn-buy">Mua ngay</button>
            </div>
            <div class="card">
                <img src="https://placehold.co/200x150" alt="Ảnh 5" class="card-img">
                <div class="card-info">
                    <h3>Cáp xoắn Type-C</h3>
                    <p class="price">200.000đ</p>
                </div>
                <button class="btn-buy">Mua ngay</button>
            </div>
            <div class="card">
                <img src="https://placehold.co/200x150" alt="Ảnh 6" class="card-img">
                <div class="card-info">
                    <h3>Keycap set PBT</h3>
                    <p class="price">650.000đ</p>
                </div>
                <button class="btn-buy">Mua ngay</button>
            </div>
            <div class="card">
                <img src="https://placehold.co/200x150" alt="Ảnh 7" class="card-img">
                <div class="card-info">
                    <h3>Giá đỡ tai nghe</h3>
                    <p class="price">320.000đ</p>
                </div>
                <button class="btn-buy">Mua ngay</button>
            </div>
            <div class="card">
                <img src="https://placehold.co/200x150" alt="Ảnh 8" class="card-img">
                <div class="card-info">
                    <h3>Bộ vệ sinh phím</h3>
                    <p class="price">95.000đ</p>
                </div>
                <button class="btn-buy">Mua ngay</button>
            </div>
        </div>
    </main>

</body>
</html>
