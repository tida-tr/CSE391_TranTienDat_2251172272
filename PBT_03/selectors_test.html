<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1 { background: yellow; }

        .price { color: red; border: 1px solid red; }

        #app header { border: 3px solid blue; }

        nav a:first-child { background: lightgrey; }

        .product.featured h2 { background: lime; }

        article > p { font-style: italic; }

        a[href="/"] { text-decoration: underline; font-weight: bold; }

        .top-bar.dark h1 { color: blue; }
    </style>
</head>
<body>
<div id="app">
    <header class="top-bar dark">
        <h1>ShopTLU</h1>
        <nav>
            <a href="/" class="active">Home</a>
            <a href="/products">Products</a>
            <a href="/about">About</a>
        </nav>
    </header>
    <main>
        <article class="product">
            <h2>iPhone 16</h2>
            <p class="price">25.990.000đ</p>
            <p>Mô tả sản phẩm...</p>
        </article>
        <article class="product featured">
            <h2>MacBook Pro</h2>
            <p class="price">45.990.000đ</p>
            <p>Mô tả sản phẩm...</p>
        </article>
    </main>
</div>
</body>
</html>
