<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản</title>
</head>
<body>

<form action="#" method="POST">
    <fieldset>
        <legend>Thông tin cá nhân</legend>

        <label>Họ tên:</label>
        <input id="name" type="text" placeholder="Nhập họ tên" required minlength="2" maxlength="50"><br><br>

        <label for="email">Email:</label>
        <input id="email" type="email" placeholder="Nhập email" required><br><br>

        <label for="phone">SĐT:</label>
        <input id="phone" type="tel" placeholder="Nhập số điện thoại" pattern="[0-9]{10}" required><br><br>

        <label for="dob">Ngày sinh:</label>
        <input id="dob" type="date" max="2026-04-30" required><br><br>
    </fieldset>

    <fieldset>
        <legend>Tài khoản</legend>

        <label for="username">Username:</label>
        <input id="username" type="text" placeholder="Nhập username"pattern="[A-Za-z0-9_]{3,20}" required><br><br>

        <label for="password">Password:</label>
        <input id="password" type="password"
               placeholder="Nhập mật khẩu"
               minlength="8"
               pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}" required><br><br>

        <label for="confirm">Xác nhận password:</label>
        <input id="confirm" type="password"
               placeholder="Nhập lại mật khẩu"
               minlength="8"
               pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}" required><br><br>
    </fieldset>

    <fieldset>
        <legend>Thông tin giao hàng</legend>

        <label for="city">Thành phố:</label>
        <select id="city">
            <option>Hà Nội</option>
            <option>TP.HCM</option>
            <option>Nam Định</option>
            <option>Thanh Hoá</option>
            <option>Nghệ An</option>
        </select><br><br>

        <label for="district">Quận/Huyện:</label>
        <select id="district">
            <option>Thanh Trì</option>
            <option>Thanh Xuân</option>
            <option>Hà Đông</option>
        </select><br><br>

        <label for="address">Địa chỉ:</label>
        <textarea id="address" rows="3"
                  placeholder="Nhập địa chỉ"></textarea><br><br>

        <p>Giới tính:</p>
        <input type="radio" id="male" name="gender">
        <label for="male">Nam</label>

        <input type="radio" id="female" name="gender">
        <label for="female">Nữ</label>

        <input type="radio" id="other" name="gender">
        <label for="other">Khác</label><br><br>

        <input type="checkbox" id="agree" required>
        <label for="agree">Tôi đồng ý điều khoản</label><br><br>
    </fieldset>

    <button type="submit">Đăng ký</button>
    <button type="reset">Reset</button>

</form>

</body>
</html>
