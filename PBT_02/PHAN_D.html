<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="" method="POST">
        <fieldset>
            <legend>Thong tin ca nhan</legend>

            <label for = "name">Name:</label>
            <input type="text" id="name" name="name" required placeholder="Ho va ten">

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required placeholder="Email@gmail.com">

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required placeholder="Password" minlength="8">

            <label for="phone">Phone:</label>
            <input type="tel" id="phone" required name="phone" placeholder="Phone number"
            pattern="[0-9]{10}">

        </fieldset>

        <label for="checkbox">
            <input type="checkbox" name="agree" required> Toi dong y dieu khoan
        </label>

        <button type="submit">Submit</button>
    </form>
</body>
</html>
