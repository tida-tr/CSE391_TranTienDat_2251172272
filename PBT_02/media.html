<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimedia</title>
</head>

<body>
<h2>Sản phẩm</h2>

<figure>
    <img src="https://placehold.co/300x200" alt="Sản phẩm 1"
         loading="lazy"
         style="max-width:100%;height:auto;">
    <figcaption>Sản phẩm 1</figcaption>
</figure>

<figure>
    <img src="https://placehold.co/300x200" alt="Sản phẩm 2"
         loading="lazy"
         style="max-width:100%;height:auto;">
    <figcaption>Sản phẩm 2</figcaption>
</figure>

<figure>
    <img src="https://placehold.co/300x200" alt="Sản phẩm 3"
         loading="lazy"
         style="max-width:100%;height:auto;">
    <figcaption>Sản phẩm 3</figcaption>
</figure>

<h3>Video YouTube</h3>
<iframe width="400" height="250"
    src="https://www.youtube.com/shorts/axXLuVa_xIU">
</iframe>

<h3>Video</h3>
<video controls poster="" width="400">
    <source src="video.mp4" type="video/mp4">
    <source src="video.webm" type="video/webm">
</video>

<h3>Audio</h3>
<audio controls>
    <source src="audio.mp3" type="audio/mpeg">
</audio>

<h3>SVG Logo</h3>
<svg width="100" height="100" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="40" stroke="green" stroke-width="4" fill="mintcream" />
</svg>

</body>
</html>
