<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý sinh viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <main class="container my-5" id="mainContent">
        <div id="alertBox" class="alert alert-success d-none shadow-sm" role="alert"></div>

        <section class="card shadow-sm border-0 rounded-3">
            <header class="card-header bg-mint text-white d-flex justify-content-between align-items-center py-3 rounded-top-3">
                <h2 class="h5 mb-0 fw-bold">Quản lý sinh viên</h2>
                <div>
                    <button class="btn btn-outline-light btn-sm me-2 px-3 fw-semibold" id="btnDeleteMultiple" disabled>Xóa</button>
                    <button class="btn btn-light-mint btn-sm px-3 fw-semibold shadow-sm" id="btnOpenAddForm">Thêm sinh viên</button>
                </div>
            </header>

            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light-mint text-muted">
                            <tr>
                                <th scope="col" class="ps-4" style="width: 5%;"><input placeholder="Chọn tất cả" type="checkbox" class="form-check-input shadow-none" id="checkAll"></th>
                                <th scope="col">Họ và tên</th>
                                <th scope="col">Mã SV</th>
                                <th scope="col">Lớp</th>
                                <th scope="col">Ngày sinh</th>
                                <th scope="col">Điểm TB</th>
                                <th scope="col" class="text-center">Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="studentTableBody">
                            </tbody>
                    </table>
                </div>
            </div>

            <footer class="card-footer bg-white d-flex justify-content-between align-items-center py-3 border-top-0 rounded-bottom-3">
                <span class="text-secondary small">
                    Hiển thị <strong id="totalStudents" class="text-dark">0</strong> sinh viên | Điểm TB lớp: <strong id="averageGPA" class="text-mint">0.0</strong>
                </span>
                <nav aria-label="Page navigation">
                    <ul class="pagination pagination-sm mb-0">
                        <li class="page-item disabled"><a class="page-link shadow-none" href="#">Trước</a></li>
                        <li class="page-item active"><a class="page-link shadow-none bg-mint border-mint text-white" href="#">1</a></li>
                        <li class="page-item"><a class="page-link shadow-none text-mint" href="#">Sau</a></li>
                    </ul>
                </nav>
            </footer>
        </section>
    </main>

    <div id="studentModal" class="custom-modal">
        <div class="custom-modal-dialog card shadow border-0 rounded-3">
            <header class="card-header bg-mint text-white py-3">
                <h5 class="mb-0" id="modalTitle">Thêm sinh viên mới</h5>
            </header>
            <div class="card-body">
                <form id="studentForm" novalidate>
                    <input type="hidden" id="editIndex" value="-1">
                    
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold">Mã sinh viên</label>
                            <input placeholder="Nhập mã sinh viên" type="text" class="form-control shadow-none" id="studentId">
                            <div class="invalid-feedback" id="error-studentId"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold">Họ và tên</label>
                            <input placeholder="Nhập họ và tên" type="text" class="form-control shadow-none" id="fullName">
                            <div class="invalid-feedback" id="error-fullName"></div>
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold">Ngày sinh</label>
                            <input placeholder="Chọn ngày sinh" type="date" class="form-control shadow-none" id="dob">
                            <div class="invalid-feedback" id="error-dob"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold">Lớp học</label>
                            <input placeholder="Nhập tên lớp" type="text" class="form-control shadow-none" id="className">
                            <div class="invalid-feedback" id="error-className"></div>
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold">Điểm trung bình</label>
                            <input placeholder="Nhập điểm trung bình" type="number" step="0.1" class="form-control shadow-none" id="gpa">
                            <div class="invalid-feedback" id="error-gpa"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold">Email</label>
                            <input placeholder="Nhập email" type="email" class="form-control shadow-none" id="email">
                            <div class="invalid-feedback" id="error-email"></div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <button type="button" class="btn btn-light shadow-none" id="btnCancel">Hủy</button>
                        <button type="submit" class="btn btn-mint shadow-none text-white">Lưu thông tin</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
