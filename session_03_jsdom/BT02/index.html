<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý công việc cá nhân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <main class="container my-5" id="mainContent">
        <div id="alertBox" class="alert alert-success d-none shadow-sm" role="alert"></div>

        <header class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h3 mb-0 fw-bold text-mint">Quản lý công việc</h2>
            <button class="btn btn-mint btn-sm px-4 py-2 fw-semibold shadow-sm text-white" id="btnOpenAddForm">Thêm công việc</button>
        </header>

        <section class="row mb-4 g-3">
            <div class="col-md-4">
                <div class="card shadow-sm border-0 bg-white rounded-3">
                    <div class="card-body text-center py-3">
                        <h6 class="text-muted mb-1 small fw-bold text-uppercase">Tổng cộng</h6>
                        <h3 class="fw-bold mb-0 text-dark" id="totalTasks">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow-sm border-0 bg-light-mint rounded-3">
                    <div class="card-body text-center py-3">
                        <h6 class="text-muted mb-1 small fw-bold text-uppercase">Đã hoàn thành</h6>
                        <h3 class="fw-bold mb-0 text-mint" id="completedTasks">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow-sm border-0 bg-white rounded-3">
                    <div class="card-body text-center py-3">
                        <h6 class="text-muted mb-1 small fw-bold text-uppercase">Chưa hoàn thành</h6>
                        <h3 class="fw-bold mb-0 text-secondary" id="incompleteTasks">0</h3>
                    </div>
                </div>
            </div>
        </section>

        <section>
            <div class="row g-3" id="taskList"></div>
        </section>
    </main>

    <div id="taskModal" class="custom-modal">
        <div class="custom-modal-dialog card shadow border-0 rounded-3">
            <header class="card-header bg-mint text-white py-3">
                <h5 class="mb-0" id="modalTitle">Thêm công việc mới</h5>
            </header>
            <div class="card-body">
                <form id="taskForm" novalidate>
                    <input type="hidden" id="editIndex" value="-1">
                    
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">Tiêu đề công việc</label>
                        <input placeholder="Tiêu đề công việc" type="text" class="form-control shadow-none" id="taskTitle">
                        <div class="invalid-feedback" id="error-taskTitle"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">Mô tả ngắn</label>
                        <textarea placeholder="Mô tả ngắn" class="form-control shadow-none" id="taskDesc" rows="2"></textarea>
                        <div class="invalid-feedback" id="error-taskDesc"></div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold">Hạn hoàn thành</label>
                            <input placeholder="Chọn ngày hoàn thành" type="date" class="form-control shadow-none" id="taskDeadline">
                            <div class="invalid-feedback" id="error-taskDeadline"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold">Mức ưu tiên</label>
                            <select title="Mức ưu tiên" class="form-select shadow-none" id="taskPriority">
                                <option value="">-- Chọn mức ưu tiên --</option>
                                <option value="Cao">Cao</option>
                                <option value="Trung bình">Trung bình</option>
                                <option value="Thấp">Thấp</option>
                            </select>
                            <div class="invalid-feedback" id="error-taskPriority"></div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <button type="button" class="btn btn-light shadow-none" id="btnCancel">Hủy</button>
                        <button type="submit" class="btn btn-mint shadow-none text-white">Lưu công việc</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
