<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý công việc cá nhân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <main class="container my-5" id="mainContent">
        <div id="alertBox" class="alert alert-success d-none shadow-sm" role="alert"></div>

        <header class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h3 mb-0 fw-bold text-mint">Quản lý công việc</h2>
            <button class="btn btn-mint btn-sm px-4 py-2 fw-semibold shadow-sm text-white" id="btnOpenAddForm">Thêm công việc</button>
        </header>

        <section class="row mb-4 g-3">
            <div class="col-md-4">
                <div class="card shadow-sm border-0 bg-white rounded-3">
                    <div class="card-body text-center py-3">
                        <h6 class="text-muted mb-1 small fw-bold text-uppercase">Tổng cộng</h6>
                        <h3 class="fw-bold mb-0 text-dark" id="totalTasks">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow-sm border-0 bg-light-mint rounded-3">
                    <div class="card-body text-center py-3">
                        <h6 class="text-muted mb-1 small fw-bold text-uppercase">Đã hoàn thành</h6>
                        <h3 class="fw-bold mb-0 text-mint" id="completedTasks">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow-sm border-0 bg-white rounded-3">
                    <div class="card-body text-center py-3">
                        <h6 class="text-muted mb-1 small fw-bold text-uppercase">Chưa hoàn thành</h6>
                        <h3 class="fw-bold mb-0 text-secondary" id="incompleteTasks">0</h3>
                    </div>
                </div>
            </div>
        </section>

        <section>
            <div class="row g-3" id="taskList"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
