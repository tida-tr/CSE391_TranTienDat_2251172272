<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Đăng ký tài khoản</h2>
        <form id="register-form">
            <div class="form-group">
                <div class="input-wrapper">
                    <input type="text" id="name" placeholder="Tên (2-50 ký tự)">
                    <span id="name-status" class="status-icon"></span>
                </div>
            </div>

            <div class="form-group">
                <input type="text" id="email" placeholder="Email">
                <div id="email-error" class="error-msg"></div>
            </div>

            <div class="form-group">
                <input type="password" id="password" placeholder="Mật khẩu">
                <div class="strength-meter">
                    <div id="strength-bar"></div>
                </div>
            </div>

            <div class="form-group">
                <div class="input-wrapper">
                    <input type="password" id="confirm" placeholder="Xác nhận mật khẩu">
                    <span id="confirm-status" class="status-icon"></span>
                </div>
            </div>

            <div class="form-group">
                <input type="text" id="phone" placeholder="Số điện thoại (0901-234-567)">
            </div>

            <button type="submit" id="submit-btn" disabled>Đăng ký</button>
        </form>
    </div>

    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-content">
            <h3>Đăng ký thành công!</h3>
            <div id="modal-info"></div>
            <button id="close-modal">Đóng</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
